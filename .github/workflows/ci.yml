name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-version:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify plugin.json#version bumped if skills/ or .claude-plugin/ changed
        run: |
          base=$(git show "$BASE_SHA":.claude-plugin/plugin.json | jq -r .version)
          head=$(jq -r .version .claude-plugin/plugin.json)
          echo "Base version: $base"
          echo "Head version: $head"

          if [ "$base" = "$head" ]; then
            changed=$(git diff --name-only "$BASE_SHA"...HEAD | grep -E '^(skills/|\.claude-plugin/)' || true)
            if [ -n "$changed" ]; then
              echo ""
              echo "❌ skills/ or .claude-plugin/ changed but plugin.json#version is still $head"
              echo ""
              echo "Changed files that require a version bump:"
              echo "$changed" | sed 's/^/  /'
              echo ""
              echo "Bump .claude-plugin/plugin.json#version to publish a new release."
              exit 1
            fi
          fi

          echo "✅ plugin version check passed"

      - name: Verify SKILL.md#version bumped if skill content changed
        if: always()
        run: |
          changed_skills=$(git diff --name-only "$BASE_SHA"...HEAD -- 'skills/*/**' \
            | awk -F/ 'NF>=3 {print $2}' | sort -u)
          if [ -z "$changed_skills" ]; then
            echo "✅ No skill content changed; per-skill version bump not required."
            exit 0
          fi
          extract_version() {
            awk '/^---$/{c++; next} c==1' | yq -r '.metadata.version // ""'
          }
          fail=0
          for skill in $changed_skills; do
            head_file="skills/$skill/SKILL.md"
            if [ ! -f "$head_file" ]; then
              echo "ℹ️  $skill: SKILL.md missing on HEAD (skill deleted); skipping."
              continue
            fi
            base_content=$(git show "$BASE_SHA:$head_file" 2>/dev/null || true)
            if [ -z "$base_content" ]; then
              echo "ℹ️  $skill: new skill on this branch; skipping bump check."
              continue
            fi
            head_v=$(extract_version < "$head_file")
            base_v=$(printf '%s\n' "$base_content" | extract_version)
            if [[ ! "$head_v" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "❌ $skill: SKILL.md metadata.version is not semver: '$head_v'"
              fail=1
              continue
            fi
            if [ "$head_v" = "$base_v" ] || ! printf '%s\n%s\n' "$base_v" "$head_v" | sort -V -C; then
              echo "❌ $skill: content changed but SKILL.md metadata.version did not strictly increase ($base_v → $head_v). Bump the patch version for bug fixes."
              fail=1
              continue
            fi
            echo "✅ $skill: $base_v → $head_v"
          done
          exit $fail

  validate-spec:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Checkout agentskills repository
        uses: actions/checkout@v6
        with:
          repository: agentskills/agentskills
          path: agentskills

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: "pip"
          cache-dependency-path: "agentskills/skills-ref/pyproject.toml"

      - name: Install skills-ref
        run: |
          cd agentskills/skills-ref
          pip install -e .

      - name: Validate all skills
        run: |
          echo "🔍 Validating all skills..."

          find skills -name "SKILL.md" | while read -r skill_file; do
            skill_dir=$(dirname "$skill_file")
            skill_name=$(basename "$skill_dir")

            echo ""
            echo "Validating $skill_name..."

            if skills-ref validate "$skill_dir"; then
              echo "✅ $skill_name is valid"
            else
              echo "❌ $skill_name validation failed"
              exit 1
            fi
          done

          echo ""
          echo "✅ All skills validated successfully"

  validate-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Ensure gh skill is available
        run: |
          if ! gh skill --help >/dev/null 2>&1; then
            echo "Installing latest gh CLI..."
            sudo mkdir -p -m 755 /etc/apt/keyrings
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg >/dev/null
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list >/dev/null
            sudo apt-get update -qq
            sudo apt-get install -y -qq gh
          fi
          gh --version | head -1

      - name: Validate with gh skill
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh skill publish --dry-run

  install-local:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install all skills (local)
        working-directory: ${{ runner.temp }}
        run: |
          npx skills add "$GITHUB_WORKSPACE" --yes
          echo "✅ Successfully installed all skills from local repository"

      - name: Verify all skill files
        working-directory: ${{ runner.temp }}
        run: |
          echo "📁 Checking installed skill files..."

          SKILLS_DIR=".agents/skills"

          if [ ! -d "$SKILLS_DIR" ]; then
            echo "❌ Skills directory not found: $SKILLS_DIR"
            exit 1
          fi

          echo "✅ Skills directory exists: $SKILLS_DIR"

          SKILL_COUNT=0
          for skill_dir in "$SKILLS_DIR"/*; do
            if [ -d "$skill_dir" ]; then
              skill_name=$(basename "$skill_dir")
              echo ""
              echo "📦 Checking skill: $skill_name"

              if [ -f "$skill_dir/SKILL.md" ]; then
                echo "  ✅ Found SKILL.md"
                SKILL_COUNT=$((SKILL_COUNT + 1))
              else
                echo "  ❌ SKILL.md not found in $skill_dir"
                exit 1
              fi
            fi
          done

          echo ""
          echo "✅ Successfully verified $SKILL_COUNT skills"

          if [ $SKILL_COUNT -eq 0 ]; then
            echo "❌ No skills were installed"
            exit 1
          fi

  install-remote:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Install all skills from Skills.sh
        run: |
          npx skills add daleseo/korean-skills --yes
          echo "✅ Successfully installed all skills from GitHub"

      - name: Verify all skill files
        run: |
          echo "📁 Checking installed skill files..."

          SKILLS_DIR=".agents/skills"

          if [ ! -d "$SKILLS_DIR" ]; then
            echo "❌ Skills directory not found: $SKILLS_DIR"
            exit 1
          fi

          echo "✅ Skills directory exists: $SKILLS_DIR"

          SKILL_COUNT=0
          for skill_dir in "$SKILLS_DIR"/*; do
            if [ -d "$skill_dir" ]; then
              skill_name=$(basename "$skill_dir")
              echo ""
              echo "📦 Checking skill: $skill_name"

              if [ -f "$skill_dir/SKILL.md" ]; then
                echo "  ✅ Found SKILL.md"
                SKILL_COUNT=$((SKILL_COUNT + 1))
              else
                echo "  ❌ SKILL.md not found in $skill_dir"
                exit 1
              fi
            fi
          done

          echo ""
          echo "✅ Successfully verified $SKILL_COUNT skills"

          if [ $SKILL_COUNT -eq 0 ]; then
            echo "❌ No skills were installed"
            exit 1
          fi
